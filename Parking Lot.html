<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Lot Management System</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            padding: 30px;
        }

        .parking-lot {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #e9ecef;
        }

        .lot-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
            text-align: center;
        }

        .parking-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .parking-spot {
            aspect-ratio: 1;
            border: 3px solid #28a745;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #d4edda;
            color: #155724;
            font-size: 0.9rem;
        }

        .parking-spot.occupied {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .parking-spot:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid;
        }

        .legend-color.available {
            background: #d4edda;
            border-color: #28a745;
        }

        .legend-color.occupied {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .control-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #e9ecef;
        }

        .panel-section {
            margin-bottom: 30px;
        }

        .panel-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .vehicle-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
        }

        .vehicle-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .vehicle-item:last-child {
            margin-bottom: 0;
        }

        .vehicle-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .vehicle-license {
            font-weight: bold;
            color: #2c3e50;
        }

        .vehicle-spot {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .vehicle-time {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .parking-grid {
                grid-template-columns: repeat(8, 1fr);
            }
        }

        @media (max-width: 768px) {
            .parking-grid {
                grid-template-columns: repeat(6, 1fr);
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <div class="container">
   <div class="header">
    <h1>Parking Lot Management System</h1>
    <p style="margin-top: 10px; font-size: 1.1rem; opacity: 0.9;">by Dulnindu Saranga</p>
    <div class="stats">
     <div class="stat-card">
      <div class="stat-number" id="totalSpots">
       100
      </div>
      <div>
       Total Spots
      </div>
     </div>
     <div class="stat-card">
      <div class="stat-number" id="availableSpots">
       100
      </div>
      <div>
       Available
      </div>
     </div>
     <div class="stat-card">
      <div class="stat-number" id="occupiedSpots">
       0
      </div>
      <div>
       Occupied
      </div>
     </div>
     <div class="stat-card">
      <div class="stat-number" id="totalRevenue">
       $0
      </div>
      <div>
       Today's Revenue
      </div>
     </div>
    </div>
   </div>
   <div class="main-content">
    <div class="parking-lot">
     <h2 class="lot-title">Parking Layout</h2>
     <div class="parking-grid" id="parkingGrid"></div>
     <div class="legend">
      <div class="legend-item">
       <div class="legend-color available"></div><span>Available</span>
      </div>
      <div class="legend-item">
       <div class="legend-color occupied"></div><span>Occupied</span>
      </div>
     </div>
    </div>
    <div class="control-panel">
     <div class="panel-section">
      <h3 class="panel-title">Check In Vehicle</h3>
      <div id="alertContainer"></div>
      <div class="form-group"><label for="licensePlate">License Plate</label> <input type="text" id="licensePlate" placeholder="Enter license plate" style="text-transform: uppercase;">
      </div>
      <div class="form-group"><label for="vehicleType">Vehicle Type</label> <select id="vehicleType"> <option value="car">Car ($5/hour)</option> <option value="motorcycle">Motorcycle ($3/hour)</option> <option value="truck">Truck ($8/hour)</option> </select>
      </div>
      <div class="form-group"><label for="spotNumber">Spot Number (Optional)</label> <input type="number" id="spotNumber" placeholder="Auto-assign if empty" min="1" max="100">
      </div><button class="btn btn-success" onclick="checkInVehicle()">Check In Vehicle</button>
     </div>
     <div class="panel-section">
      <h3 class="panel-title">Check Out Vehicle</h3>
      <div class="form-group"><label for="checkoutLicense">License Plate</label> <input type="text" id="checkoutLicense" placeholder="Enter license plate" style="text-transform: uppercase;">
      </div><button class="btn btn-danger" onclick="checkOutVehicle()">Check Out &amp; Calculate Fee</button>
     </div>
     <div class="panel-section">
      <h3 class="panel-title">Search Vehicle</h3>
      <div class="form-group"><label for="searchLicense">License Plate</label> <input type="text" id="searchLicense" placeholder="Enter license plate" style="text-transform: uppercase;">
      </div><button class="btn btn-primary" onclick="searchVehicle()">Search Vehicle</button>
     </div>
     <div class="panel-section">
      <h3 class="panel-title">Current Vehicles</h3>
      <div class="vehicle-list" id="vehicleList">
       <div style="text-align: center; color: #6c757d; padding: 20px;">
        No vehicles currently parked
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
        class ParkingLotManager {
            constructor() {
                this.totalSpots = 100;
                this.parkingSpots = new Array(this.totalSpots).fill(null);
                this.vehicles = new Map();
                this.revenue = 0;
                this.rates = {
                    car: 5,
                    motorcycle: 3,
                    truck: 8
                };
                this.initializeParkingGrid();
                this.updateStats();
            }

            initializeParkingGrid() {
                const grid = document.getElementById('parkingGrid');
                grid.innerHTML = '';
                
                for (let i = 0; i < this.totalSpots; i++) {
                    const spot = document.createElement('div');
                    spot.className = 'parking-spot';
                    spot.textContent = i + 1;
                    spot.onclick = () => this.spotClicked(i + 1);
                    grid.appendChild(spot);
                }
            }

            spotClicked(spotNumber) {
                const vehicle = this.parkingSpots[spotNumber - 1];
                if (vehicle) {
                    this.showAlert(`Spot ${spotNumber}: ${vehicle.licensePlate} (${vehicle.type}) - Parked since ${vehicle.checkInTime.toLocaleString()}`, 'info');
                } else {
                    this.showAlert(`Spot ${spotNumber} is available`, 'info');
                }
            }

            findAvailableSpot() {
                for (let i = 0; i < this.totalSpots; i++) {
                    if (this.parkingSpots[i] === null) {
                        return i + 1;
                    }
                }
                return null;
            }

            checkInVehicle(licensePlate, vehicleType, preferredSpot = null) {
                licensePlate = licensePlate.toUpperCase().trim();
                
                if (!licensePlate) {
                    this.showAlert('Please enter a license plate', 'error');
                    return false;
                }

                if (this.vehicles.has(licensePlate)) {
                    this.showAlert('Vehicle is already parked', 'error');
                    return false;
                }

                let spotNumber;
                if (preferredSpot && preferredSpot >= 1 && preferredSpot <= this.totalSpots) {
                    if (this.parkingSpots[preferredSpot - 1] !== null) {
                        this.showAlert(`Spot ${preferredSpot} is already occupied`, 'error');
                        return false;
                    }
                    spotNumber = preferredSpot;
                } else {
                    spotNumber = this.findAvailableSpot();
                    if (!spotNumber) {
                        this.showAlert('No available spots', 'error');
                        return false;
                    }
                }

                const vehicle = {
                    licensePlate,
                    type: vehicleType,
                    spotNumber,
                    checkInTime: new Date()
                };

                this.parkingSpots[spotNumber - 1] = vehicle;
                this.vehicles.set(licensePlate, vehicle);
                
                this.updateParkingGrid();
                this.updateStats();
                this.updateVehicleList();
                
                this.showAlert(`Vehicle ${licensePlate} checked in to spot ${spotNumber}`, 'success');
                return true;
            }

            checkOutVehicle(licensePlate) {
                licensePlate = licensePlate.toUpperCase().trim();
                
                if (!licensePlate) {
                    this.showAlert('Please enter a license plate', 'error');
                    return false;
                }

                const vehicle = this.vehicles.get(licensePlate);
                if (!vehicle) {
                    this.showAlert('Vehicle not found', 'error');
                    return false;
                }

                const checkOutTime = new Date();
                const hoursParked = Math.ceil((checkOutTime - vehicle.checkInTime) / (1000 * 60 * 60));
                const fee = hoursParked * this.rates[vehicle.type];
                
                this.parkingSpots[vehicle.spotNumber - 1] = null;
                this.vehicles.delete(licensePlate);
                this.revenue += fee;

                this.updateParkingGrid();
                this.updateStats();
                this.updateVehicleList();

                this.showAlert(
                    `Vehicle ${licensePlate} checked out from spot ${vehicle.spotNumber}. ` +
                    `Parked for ${hoursParked} hour(s). Fee: $${fee}`, 
                    'success'
                );
                return true;
            }

            searchVehicle(licensePlate) {
                licensePlate = licensePlate.toUpperCase().trim();
                
                if (!licensePlate) {
                    this.showAlert('Please enter a license plate', 'error');
                    return;
                }

                const vehicle = this.vehicles.get(licensePlate);
                if (vehicle) {
                    const hoursParked = Math.ceil((new Date() - vehicle.checkInTime) / (1000 * 60 * 60));
                    const currentFee = hoursParked * this.rates[vehicle.type];
                    
                    this.showAlert(
                        `Found: ${licensePlate} in spot ${vehicle.spotNumber} (${vehicle.type}). ` +
                        `Parked since ${vehicle.checkInTime.toLocaleString()}. Current fee: $${currentFee}`,
                        'info'
                    );
                    
                    // Highlight the spot
                    this.highlightSpot(vehicle.spotNumber);
                } else {
                    this.showAlert('Vehicle not found', 'error');
                }
            }

            highlightSpot(spotNumber) {
                const spots = document.querySelectorAll('.parking-spot');
                spots.forEach(spot => spot.style.boxShadow = '');
                
                const targetSpot = spots[spotNumber - 1];
                targetSpot.style.boxShadow = '0 0 20px #3498db';
                
                setTimeout(() => {
                    targetSpot.style.boxShadow = '';
                }, 3000);
            }

            updateParkingGrid() {
                const spots = document.querySelectorAll('.parking-spot');
                spots.forEach((spot, index) => {
                    const vehicle = this.parkingSpots[index];
                    if (vehicle) {
                        spot.className = 'parking-spot occupied';
                        spot.title = `${vehicle.licensePlate} (${vehicle.type})`;
                    } else {
                        spot.className = 'parking-spot';
                        spot.title = `Spot ${index + 1} - Available`;
                    }
                });
            }

            updateStats() {
                const occupied = this.vehicles.size;
                const available = this.totalSpots - occupied;
                
                document.getElementById('totalSpots').textContent = this.totalSpots;
                document.getElementById('availableSpots').textContent = available;
                document.getElementById('occupiedSpots').textContent = occupied;
                document.getElementById('totalRevenue').textContent = `$${this.revenue}`;
            }

            updateVehicleList() {
                const listContainer = document.getElementById('vehicleList');
                
                if (this.vehicles.size === 0) {
                    listContainer.innerHTML = '<div style="text-align: center; color: #6c757d; padding: 20px;">No vehicles currently parked</div>';
                    return;
                }

                let html = '';
                this.vehicles.forEach(vehicle => {
                    const hoursParked = Math.ceil((new Date() - vehicle.checkInTime) / (1000 * 60 * 60));
                    const currentFee = hoursParked * this.rates[vehicle.type];
                    
                    html += `
                        <div class="vehicle-item">
                            <div class="vehicle-info">
                                <span class="vehicle-license">${vehicle.licensePlate}</span>
                                <span class="vehicle-spot">Spot ${vehicle.spotNumber}</span>
                            </div>
                            <div class="vehicle-time">
                                ${vehicle.type} • ${vehicle.checkInTime.toLocaleString()} • $${currentFee}
                            </div>
                        </div>
                    `;
                });
                
                listContainer.innerHTML = html;
            }

            showAlert(message, type) {
                const container = document.getElementById('alertContainer');
                const alert = document.createElement('div');
                alert.className = `alert alert-${type}`;
                alert.textContent = message;
                
                container.innerHTML = '';
                container.appendChild(alert);
                
                setTimeout(() => {
                    alert.remove();
                }, 5000);
            }
        }

        // Initialize the parking lot manager
        const parkingLot = new ParkingLotManager();

        // Event handlers
        function checkInVehicle() {
            const licensePlate = document.getElementById('licensePlate').value;
            const vehicleType = document.getElementById('vehicleType').value;
            const spotNumber = document.getElementById('spotNumber').value;
            
            if (parkingLot.checkInVehicle(licensePlate, vehicleType, spotNumber ? parseInt(spotNumber) : null)) {
                document.getElementById('licensePlate').value = '';
                document.getElementById('spotNumber').value = '';
            }
        }

        function checkOutVehicle() {
            const licensePlate = document.getElementById('checkoutLicense').value;
            
            if (parkingLot.checkOutVehicle(licensePlate)) {
                document.getElementById('checkoutLicense').value = '';
            }
        }

        function searchVehicle() {
            const licensePlate = document.getElementById('searchLicense').value;
            parkingLot.searchVehicle(licensePlate);
        }

        // Auto-uppercase license plate inputs
        document.getElementById('licensePlate').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        document.getElementById('checkoutLicense').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        document.getElementById('searchLicense').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        // Enter key support
        document.getElementById('licensePlate').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkInVehicle();
        });

        document.getElementById('checkoutLicense').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkOutVehicle();
        });

        document.getElementById('searchLicense').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchVehicle();
        });
    </script>
